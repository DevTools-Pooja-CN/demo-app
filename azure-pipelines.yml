trigger:
  branches:
    include:
      - main


pool:
  name: 'Default' 

variables:
  imageName: 'poojadocker404/python-demo'
  tag: '$(Build.BuildId)'

stages:
- stage: BuildAndTest
  displayName: "Install and Run Tests"
  jobs:
  - job: Test
    steps:
    # NOTE: UsePythonVersion might fail on a local agent if Python isn't 
    # in the expected directory. If it fails, just ensure Python 3.12 
    # is installed on your laptop and in your System PATH.
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'
      displayName: "Use Python 3.12"

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: "Install dependencies"

    - script: |
        pip install pytest
        pytest test_app.py
      displayName: "Run unit tests"

- stage: BuildAndPush
  displayName: "Build and Push Docker Image"
  dependsOn: BuildAndTest
  jobs:
  - job: DockerBuild
    steps:
    - task: Docker@2
      displayName: "Build and Push Image"
      inputs:
        containerRegistry: 'docker-hub-connection'
        repository: 'poojadocker404/python-demo'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)