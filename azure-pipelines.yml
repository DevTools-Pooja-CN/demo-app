trigger:
  branches:
    include:
      - main

# Points to your laptop
pool:
  name: 'Default' 

variables:
  imageName: 'poojadocker404/python-demo'
  tag: '$(Build.BuildId)'

stages:

- stage: BuildAndTest
  displayName: "Install and Run Tests"
  jobs:
  - job: Test
    steps:
    # We use a standard script instead of the Python Task to avoid Admin prompts
    - script: |
        python --version
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: "Install dependencies"

    - script: |
        pip install pytest
        pytest test_app.py
      displayName: "Run unit tests"

- stage: BuildAndPush
  displayName: "Build and Push Docker Image"
  dependsOn: BuildAndTest
  jobs:
  - job: DockerBuild
    steps:
    # Ensure Docker Desktop is RUNNING on your laptop before this starts
    - task: Docker@2
      displayName: "Build and Push Image"
      inputs:
        containerRegistry: 'docker-hub-connection'
        repository: 'poojadocker404/python-demo'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)